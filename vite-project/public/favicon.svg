<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="nebulaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />   <!-- cyan-400 -->
      <stop offset="50%" stop-color="#818cf8" />  <!-- indigo-400 -->
      <stop offset="100%" stop-color="#e879f9" /> <!-- fuchsia-400 -->
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <rect width="100" height="100" rx="20" fill="#05010A" />
  
  <path d="M 25 75 L 25 25 L 45 25 L 75 60 L 75 25 L 90 25 L 90 75 L 70 75 L 40 40 L 40 75 Z" fill="url(#nebulaGradient)" filter="url(#glow)" />
</svg>